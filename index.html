<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Pulse | Event Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>TechFest 2026</h1>
            <p>Register now to secure your spot in the ultimate innovation challenge.</p>
        </header>

        <section class="form-container">
            <form action="#">
                <div class="input-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" placeholder="enter a name" required>
                </div>

                <div class="input-group">
                    <label for="email">College Email</label>
                    <input type="email" id="email" placeholder="enter a emailid" required>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label for="student-id">Student ID</label>
                        <input type="text" id="student-id" placeholder="A1234567" required>
                    </div>
                    <div class="input-group">
                        <label for="department">Department</label>
                            <select id="department">
                            <option value="cs">Computer Science</option>
                            <option value="eng">Engineering</option>
                            <option value="arts">Fine Arts</option>
                            <option value="bus">Business</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Select Event</label>
                    <div class="radio-group">
                        <input type="radio" id="hackathon" name="event" value="hackathon">
                        <label for="hackathon">Hackathon</label>
                        
                        <input type="radio" id="robotics" name="event" value="robotics">
                        <label for="robotics">Robotics</label>
                        
                        <input type="radio" id="debate" name="event" value="debate">
                        <label for="debate">Debate</label>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Complete Registration</button>
            </form>
        </section>
    </div>

</body>
</html>
